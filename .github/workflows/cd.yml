name: Continuous Deployment Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-capstone:latest

  deploy-to-cloud:
    name: Remote SSH Deployment to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Stack via Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            if [ ! -d "2212277-devops-project" ]; then
              git clone https://github.com/aatirraza/2212277-devops-project.git
              cd 2212277-devops-project
            else
              cd 2212277-devops-project
              git pull origin main
            fi

            export DB_USER="devops"
            export DB_PASSWORD="secure_prod_password_123"
            export DB_NAME="appdb"
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"

            # Log in to Docker Hub on the server to securely pull the image
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
